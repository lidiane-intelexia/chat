version: '3.9'

services:
  db:
    image: postgres:15
    container_name: chat-report-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_reports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_reports"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chat-report-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/chat_reports?schema=public
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chat-report-pgadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin:
